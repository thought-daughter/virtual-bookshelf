<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Bookshelf</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="progressOverlay" style="display:none;">
        <div class="progress-box">
            <h2 id="progressText">Preparing download...</h2>
        </div>
    </div>

    <div class="controls">
        <h1>My Virtual Bookshelf</h1>
        <p>Upload your Goodreads CSV export to generate your shelf.</p>
        
        <div class="toggles">
            <label>
                <input type="checkbox" id="readOnlyToggle" checked> 
                Use "Read" list only
            </label>
            <label>
                <input type="checkbox" id="multipleExportToggle" checked> 
                Export multiple images (Pages)
            </label>
        </div>

        <input type="file" id="csvFileInput" accept=".csv" />
        <button id="exportBtn" style="display:none;">Export for Aura Frame</button>
    </div>

    <input type="file" id="manualCoverUpload" accept="image/*" style="display:none;" />

    <div id="frame-container"></div>

    <script src="script.js"></script>
</body>
</html>
